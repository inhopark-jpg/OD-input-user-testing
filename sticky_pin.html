<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>오송 버스 호출</title>
    <!-- Tailwind CSS --><script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS --><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- Phosphor Icons --><script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body, html {
            height: 100%;
            margin: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
        }
        #map {
            height: 100%;
            width: 100%;
            z-index: 0;
        }
        .floating-panel {
            z-index: 1000;
        }
        
        /* Bus Stop Icon Style */
        .bus-stop-inner {
            width: 100%;
            height: 100%;
            background-color: #3B82F6; /* Blue-500 */
            border: 2px solid white;
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            font-size: 14px;
            cursor: pointer; 
            transition: transform 0.1s; /* Only transform for active state */
        }
        .bus-stop-inner:active {
            transform: scale(0.9);
        }

        /* NEW: Add transition for Leaflet markers themselves */
        /* This class is applied by Leaflet to the container of custom icons */
        .leaflet-marker-icon {
            transition: opacity 0.3s ease-in-out; /* Smooth fade for opacity changes */
        }


        /* Current Location (Origin) Icon Style */
        .current-location-marker {
            background-color: white;
            border: 6px solid #2563EB; /* Blue-600 */
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Center Fixed Pin Style */
        #center-pin {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -100%); /* Tip of pin at center */
            z-index: 500;
            pointer-events: none; /* Let clicks pass through to map */
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
            transition: transform 0.1s;
        }
        
        /* Bounce animation when map moves */
        .is-moving #center-pin {
            transform: translate(-50%, -115%);
        }

        /* Button Disabled State Visuals */
        .btn-disabled {
            background-color: #9CA3AF !important; /* Gray-400 */
            cursor: not-allowed;
            box-shadow: none !important;
        }
    </style>
</head>
<body class="bg-gray-100 relative">

    <!-- Map --><div id="map"></div>

    <!-- FIXED CENTER PIN (Overlay) --><div id="center-pin">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#DC2626" stroke="white" stroke-width="1.5" class="w-12 h-12">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
            <circle cx="12" cy="9" r="3" fill="white"/>
        </svg>
        <!-- Shadow dot --><div class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-2 h-1 bg-black opacity-20 rounded-full blur-[2px]"></div>
    </div>

    <!-- Input Panel (Compact Version) --><div class="floating-panel absolute top-4 left-4 right-4 bg-white rounded-xl shadow-lg p-3 flex flex-col gap-2">
        <!-- Origin --><div class="flex items-center gap-3 bg-gray-50 p-2 rounded-lg border border-gray-100">
            <div class="text-blue-600"><i class="ph-fill ph-navigation-arrow text-lg"></i></div>
            <div class="flex-1">
                <label class="block text-[10px] font-bold text-gray-400 uppercase leading-tight">출발지</label>
                <input type="text" value="오송역 (현재 위치)" class="w-full bg-transparent outline-none text-gray-800 font-medium text-sm leading-tight" readonly>
            </div>
        </div>
        
        <!-- Destination --><div class="flex items-center gap-3 bg-white p-2 rounded-lg ring-1 ring-black shadow-sm">
            <div class="text-red-600"><i class="ph-fill ph-map-pin text-lg"></i></div>
            <div class="flex-1">
                <label class="block text-[10px] font-bold text-gray-400 uppercase leading-tight">도착지</label>
                <input type="text" id="dest-input" placeholder="지도를 움직여 정류장 선택" class="w-full bg-transparent outline-none text-gray-800 font-medium text-sm leading-tight" readonly>
            </div>
        </div>
    </div>

    <!-- Toast Notification --><div id="toast" class="floating-panel absolute top-40 left-1/2 transform -translate-x-1/2 bg-black text-white text-xs px-4 py-2 rounded-full opacity-0 transition-opacity duration-300 pointer-events-none whitespace-nowrap z-[2000]">
        가장 가까운 정류장으로 설정됨
    </div>

    <!-- Error Toast (For button click) --><div id="error-toast" class="floating-panel absolute bottom-24 left-1/2 transform -translate-x-1/2 bg-red-500 text-white text-sm px-6 py-3 rounded-full opacity-0 transition-opacity duration-300 pointer-events-none whitespace-nowrap font-bold shadow-lg z-[2000]">
        정류장을 선택해주세요
    </div>

    <!-- Bottom Action Button --><div class="floating-panel absolute bottom-8 left-4 right-4">
        <button id="action-btn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl text-lg transition-all shadow-lg shadow-blue-200 btn-disabled">
            도착지 선택
        </button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        // 0. Global State & Elements
        const destInput = document.getElementById('dest-input');
        const toast = document.getElementById('toast');
        const errorToast = document.getElementById('error-toast');
        const actionBtn = document.getElementById('action-btn');
        const body = document.body;
        let isSnapping = false; 
        let currentSelectedStop = null; 

        function showToast(msg) {
            toast.innerText = msg || "가장 가까운 정류장으로 설정됨";
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2000);
        }

        function showErrorToast() {
            errorToast.style.opacity = '1';
            setTimeout(() => errorToast.style.opacity = '0', 2000);
        }

        function updateButtonState(isValid) {
            if (isValid) {
                actionBtn.classList.remove('btn-disabled');
                actionBtn.classList.add('hover:bg-blue-700', 'active:scale-95');
            } else {
                actionBtn.classList.add('btn-disabled');
                actionBtn.classList.remove('hover:bg-blue-700', 'active:scale-95');
            }
        }

        actionBtn.addEventListener('click', () => {
            if (actionBtn.classList.contains('btn-disabled')) {
                showErrorToast();
            } else {
                showToast("도착지가 선택되었습니다!");
            }
        });

        // 1. Configuration: Osong-eup Center (Osong Station)
        const OSONG_CENTER = [36.6345, 127.2964]; 
        
        const map = L.map('map', {
            zoomControl: false,
            center: OSONG_CENTER,
            zoom: 15,
            scrollWheelZoom: 'center',
            touchZoom: 'center',
            doubleClickZoom: 'center'
        });

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap, © CARTO',
            maxZoom: 20
        }).addTo(map);

        const currentLocationIcon = L.divIcon({
            className: 'current-location-marker',
            iconSize: [20, 20],
            iconAnchor: [10, 10]
        });
        
        L.marker(OSONG_CENTER, { icon: currentLocationIcon, zIndexOffset: 100 }).addTo(map);


        // 2. Bus Stops Data
        const majorStops = [
            { lat: 36.6345, lng: 127.2964, name: "오송역 (KTX)" },
            { lat: 36.6352, lng: 127.2970, name: "오송역 7번출구" },
            { lat: 36.6338, lng: 127.2958, name: "오송역 BRT 정류장" },
            { lat: 36.6375, lng: 127.3001, name: "식약처 (보건의료행정타운)" },
            { lat: 36.6402, lng: 127.2955, name: "오송생명과학단지" },
            { lat: 36.6421, lng: 127.2898, name: "오송휴먼시아 1단지" },
            { lat: 36.6445, lng: 127.2872, name: "오송휴먼시아 2단지" },
            { lat: 36.6418, lng: 127.2851, name: "롯데캐슬 아파트" },
            { lat: 36.6435, lng: 127.2915, name: "오송고등학교" },
            { lat: 36.6462, lng: 127.2845, name: "오송호수공원" },
            { lat: 36.6310, lng: 127.2945, name: "오송119안전센터" },
            { lat: 36.6285, lng: 127.2930, name: "오송읍 행정복지센터" },
            { lat: 36.6390, lng: 127.3025, name: "질병관리청" },
            { lat: 36.6480, lng: 127.2900, name: "오송힐데스하임" },
            { lat: 36.6501, lng: 127.2885, name: "오송상록롯데캐슬" },
            { lat: 36.6360, lng: 127.3050, name: "국가철도공단" },
            { lat: 36.6320, lng: 127.3000, name: "충북C&V센터" },
            { lat: 36.6250, lng: 127.2980, name: "오송두산위브" },
            { lat: 36.6388, lng: 127.2800, name: "만수초등학교" },
            { lat: 36.6405, lng: 127.2750, name: "오송쌍용예가" },
            { lat: 36.6520, lng: 127.2750, name: "오송 대광로제비앙" },
            { lat: 36.6545, lng: 127.2720, name: "오송 파라곤 센트럴시티" },
            { lat: 36.6510, lng: 127.2785, name: "오송 2산단 상가주택" },
            { lat: 36.6555, lng: 127.2700, name: "오송 동아라이크텐" },
            { lat: 36.6580, lng: 127.2680, name: "바이오폴리스 지구 입구" },
            { lat: 36.6485, lng: 127.2725, name: "봉산리 입구" },
            { lat: 36.6525, lng: 127.2650, name: "정중리 마을회관" },
            { lat: 36.6450, lng: 127.2820, name: "첨단의료복합단지 북측" },
            { lat: 36.6495, lng: 127.2835, name: "오송호수공원 북측광장" },
            { lat: 36.6395, lng: 127.3015, name: "식약처 후문" },
            { lat: 36.6600, lng: 127.2750, name: "오송 바이오산단 지원센터" },
            { lat: 36.6570, lng: 127.2800, name: "오송 컨퍼런스홀" },
            { lat: 36.6420, lng: 127.2680, name: "오송 서부 체육공원" }
        ];

        let busStops = [];
        let leafletMarkers = []; // To store Leaflet Marker objects

        function addRandomStops(count) {
            for (let i = 0; i < count; i++) {
                const r = 0.025 * Math.sqrt(Math.random());
                const theta = Math.random() * 2 * Math.PI;
                const lat = OSONG_CENTER[0] + r * Math.cos(theta);
                const lng = OSONG_CENTER[1] + r * Math.sin(theta) * 1.1; 
                busStops.push({
                    lat: lat,
                    lng: lng,
                    name: `마을버스 정류장 #${i + 1}`
                });
            }
        }
        addRandomStops(80); 
        busStops = [...majorStops, ...busStops]; // Combine real and generated

        const busLayer = L.layerGroup().addTo(map);
        const busStopIcon = L.divIcon({
            html: '<div class="bus-stop-inner"><i class="ph-fill ph-bus"></i></div>',
            className: '', 
            iconSize: [28, 28],
            iconAnchor: [14, 14]
        });

        busStops.forEach((stop) => {
            const marker = L.marker([stop.lat, stop.lng], { icon: busStopIcon }).addTo(busLayer);
            leafletMarkers.push(marker); // Store the Leaflet marker object
            
            marker.on('click', () => {
                isSnapping = true;
                destInput.value = stop.name;
                currentSelectedStop = stop; 
                updateButtonState(true); 

                map.flyTo([stop.lat, stop.lng], 16, {
                    animate: true,
                    duration: 0.6
                });
                showToast();
            });
        });

        // ** NEW: Zoom Level Visibility Logic with Fade **
        map.on('zoomend', () => {
            const currentZoom = map.getZoom();
            if (currentZoom < 14) {
                // Fade out markers
                leafletMarkers.forEach(marker => {
                    marker.setOpacity(0);
                });
                // Remove layer after fade out
                setTimeout(() => {
                    if (map.hasLayer(busLayer)) {
                        map.removeLayer(busLayer);
                    }
                }, 300); // Match CSS transition duration
            } else {
                // Add layer if not present
                if (!map.hasLayer(busLayer)) {
                    map.addLayer(busLayer);
                }
                // Fade in markers
                leafletMarkers.forEach(marker => {
                    marker.setOpacity(1);
                });
            }
        });


        function findNearestStop(latlng) {
            let nearest = null;
            let minDist = Infinity;
            busStops.forEach(stop => {
                const stopLatLng = L.latLng(stop.lat, stop.lng);
                const dist = latlng.distanceTo(stopLatLng);
                if (dist < minDist) {
                    minDist = dist;
                    nearest = stop;
                }
            });
            return nearest;
        }

        map.on('movestart', () => {
            if(!isSnapping) {
                body.classList.add('is-moving');
                destInput.value = "위치 설정 중...";
                currentSelectedStop = null;
                updateButtonState(false); 
            }
        });

        map.on('moveend', () => {
            body.classList.remove('is-moving');

            if (isSnapping) {
                isSnapping = false;
                return; 
            }

            const center = map.getCenter();
            const nearest = findNearestStop(center);

            currentSelectedStop = null;
            updateButtonState(false);

            if (nearest) {
                const dist = center.distanceTo([nearest.lat, nearest.lng]);
                
                if (dist < 400) {
                    isSnapping = true; 
                    currentSelectedStop = nearest; 
                    updateButtonState(true); 
                    destInput.value = nearest.name;

                    map.panTo([nearest.lat, nearest.lng], {
                        animate: true,
                        duration: 0.3 
                    });
                    showToast();
                } else {
                     destInput.value = ""; 
                     destInput.placeholder = "지도를 움직여 정류장 선택";
                }
            } else {
                destInput.value = ""; 
                destInput.placeholder = "지도를 움직여 정류장 선택";
            }
        });

        // Initial State
        setTimeout(() => {
            map.fire('moveend');
            map.fire('zoomend'); // Trigger zoomend to set initial marker visibility
        }, 500);

    </script>
</body>
</html>
